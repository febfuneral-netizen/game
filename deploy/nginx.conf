# Nginx 反向代理 + SSL 配置
# 部署到 /etc/nginx/conf.d/quiz-miniapp.conf

server {
    listen 80;
    server_name game.chaogetalks.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name game.chaogetalks.com;

    # SSL 证书 (使用 certbot 或已有通配符证书)
    ssl_certificate     /etc/nginx/ssl/game.chaogetalks.com.pem;
    ssl_certificate_key /etc/nginx/ssl/game.chaogetalks.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 静态资源缓存
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS
        add_header Access-Control-Allow-Origin '*';
        add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS';
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization';
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # [Phase 2] WebSocket 代理
    # location /applet/ws/socket.io/ {
    #     proxy_pass http://127.0.0.1:3001;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # 根路径
    location / {
        return 404;
    }
}

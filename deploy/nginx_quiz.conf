server {
    listen 80;
    server_name game.chaogetalks.com 47.108.61.209;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name game.chaogetalks.com 47.108.61.209;

    ssl_certificate     /etc/letsencrypt/live/game.chaogetalks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.chaogetalks.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API 反向代理
    location /api/ {
        client_max_body_size 50m;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin '*';
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization';
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # WebSocket 代理
    location /ws/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 题库管理后台 SPA
    location /admin/ {
        root /data/quiz-miniapp;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location = /admin/index.html {
        root /data/quiz-miniapp;
    }

    # 对战测试页面
    location /battle-test.html {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # 其他路径返回 404
    location / {
        return 404;
    }
}
